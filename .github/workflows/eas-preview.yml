name: EAS Preview APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN2 }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check EAS auth and project
        run: |
          echo "--- whoami ---"
          eas whoami || true
          echo "--- project info ---"
          eas project:info || true
        env:
          EXPO_NO_DOCTOR: "1"

      - name: Build preview APK
        run: eas build --platform android --profile preview --non-interactive --clear-cache
        env:
          EXPO_NO_DOCTOR: "1"
