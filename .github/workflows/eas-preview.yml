name: EAS Preview APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN2 }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build preview APK
        id: eas_build
        run: |
          eas build --platform android --profile preview --non-interactive --clear-cache 2>&1 | tee /tmp/eas_output.txt
          echo "EAS_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
        env:
          EXPO_NO_DOCTOR: "1"

      - name: Output EAS result to summary
        if: always()
        run: |
          echo "## EAS Build Output" >> $GITHUB_STEP_SUMMARY
          cat /tmp/eas_output.txt >> $GITHUB_STEP_SUMMARY || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $EAS_EXIT" >> $GITHUB_STEP_SUMMARY

      - name: Fail if EAS failed
        if: always()
        run: exit $EAS_EXIT
